<div class="main-content">

```
<!-- DASHBOARD -->
<section id="view-dashboard" class="view">

    <h2>Employer Dashboard</h2>

    <div class="stats-grid">

        <div class="stat-card">
            <h3 id="totalJobs">0</h3>
            <p>Jobs Posted</p>
        </div>

        <div class="stat-card">
            <h3 id="totalApplicants">0</h3>
            <p>Applicants</p>
        </div>

        <div class="stat-card">
            <h3 id="totalMessages">0</h3>
            <p>Messages</p>
        </div>

    </div>

    <div class="chart-box">

        <h3>Job Analytics</h3>

        <canvas id="jobChart" width="600" height="250"></canvas>

    </div>

</section>

<!-- POST JOB -->
<section id="view-postJob" class="view">

    <h2>Post Job</h2>

    <input id="jobTitle" placeholder="Title">
    <input id="jobCompany" placeholder="Company">
    <input id="jobSalary" placeholder="Salary">

    <textarea
        id="jobDescription"
        placeholder="Description">
    </textarea>

    <button onclick="postJob()">
        Post Job
    </button>

</section>

<!-- MY JOBS -->
<section id="view-myJobs" class="view">

    <h2>My Posted Jobs</h2>

    <div id="myJobsContainer"></div>

</section>

<!-- JOB DETAIL -->
<section id="view-jobDetail" class="view">

    <h2>Job Details</h2>

    <div id="jobDetailContainer"></div>

    <hr>

    <h3>Applicants</h3>

    <div id="jobDetailApplicants"></div>

</section>

<!-- FIND JOBS -->
<section id="view-findJobs" class="view">

    <h2>Find Jobs</h2>

    <div id="jobsContainer"></div>

</section>

<!-- APPLICATIONS -->
<section id="view-applications" class="view">

    <h2>My Applications</h2>

    <div id="applicationsContainer"></div>

</section>

<!-- PROFILE -->
<section id="view-profile" class="view">

    <h2>Profile</h2>

    <input id="fullName" placeholder="Full Name">

    <input
        id="jobTitleProfile"
        placeholder="Job Title">

    <textarea
        id="bio"
        placeholder="Bio">
    </textarea>

    <input
        type="file"
        id="resumeUpload">

    <button onclick="saveProfile()">
        Save Profile
    </button>

</section>

<!-- MESSAGES -->
<section id="view-messages" class="view">

    <h2>Messages</h2>

    <div class="messages-layout">

        <div id="chatList"></div>

        <div class="chat-panel">

            <div id="chatMessages"></div>

            <div class="chat-input-area">

                <input
                    id="messageInput"
                    placeholder="Message...">

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

</section>

<!-- ADMIN DASHBOARD -->
<section id="view-adminDashboard" class="view">

    <h2>Admin Dashboard</h2>

    <div class="stats-grid">

        <div class="stat-card">
            <h3 id="totalUsers">0</h3>
            <p>Users</p>
        </div>

        <div class="stat-card">
            <h3 id="totalJobsAdmin">0</h3>
            <p>Jobs</p>
        </div>

        <div class="stat-card">
            <h3 id="totalApplicationsAdmin">0</h3>
            <p>Applications</p>
        </div>

    </div>

</section>

<section id="view-adminUsers" class="view">

    <h2>Users</h2>

    <div id="adminUsersContainer"></div>

</section>

<section id="view-adminJobs" class="view">

    <h2>Jobs</h2>

    <div id="adminJobsContainer"></div>

</section>
```
