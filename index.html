<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remote Work Hub</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase (compat for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
</head>

<body>

<!-- =========================
     HOME PAGE
========================= -->
<div id="homePage">

    <div class="hero-section">

        <div class="navbar">
            <div class="logo">RemoteWork Hub</div>

            <div class="nav-buttons">
                <button class="btn-secondary" onclick="openAuth('login')">Login</button>
                <button class="btn-primary" onclick="openAuth('register')">Register</button>
            </div>
        </div>

        <div class="hero-content">
            <h1>Find Work. Hire Talent.</h1>
            <p>Modern OLJ-style freelance marketplace for remote jobs.</p>

            <div class="hero-buttons">
                <button class="btn-primary" onclick="openAuth('register')">
                    Get Started
                </button>
            </div>
        </div>

    </div>
</div>

<!-- =========================
     AUTH MODAL
========================= -->
<div id="authModal" class="modal">

    <div class="modal-content">

        <span class="close-btn" onclick="closeAuth()">&times;</span>

        <h2 id="authTitle">Login</h2>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <select id="role">
            <option value="jobseeker">Job Seeker</option>
            <option value="employer">Employer</option>
        </select>

        <button id="loginBtn" class="btn-primary" onclick="login()">Login</button>
        <button id="registerBtn" class="btn-primary" onclick="register()" style="display:none;">Register</button>

    </div>
</div>

<!-- =========================
     MAIN APP
========================= -->
<div id="appContainer">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-header">
            Dashboard
        </div>

        <p id="userEmail"></p>

        <!-- EMPLOYER MENU -->
        <div id="employerMenu">

            <button onclick="showView('dashboard')">Dashboard</button>
            <button onclick="showView('postJob')">Post Job</button>
            <button onclick="showView('myJobs')">My Jobs</button>
            <button onclick="showView('applicants')">Applicants</button>
            <button onclick="showView('messages')">Messages</button>

        </div>

        <!-- JOBSEEKER MENU -->
        <div id="jobseekerMenu">

            <button onclick="showView('findJobs')">Find Jobs</button>
            <button onclick="showView('applications')">Applications</button>
            <button onclick="showView('profile')">Profile</button>
            <button onclick="showView('messages')">Messages</button>

        </div>

        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- DASHBOARD -->
        <section id="view-dashboard" class="view">
            <h2>Employer Dashboard</h2>

            <div class="stats-grid">

                <div class="stat-card">
                    <h3 id="totalJobs">0</h3>
                    <p>Jobs Posted</p>
                </div>

                <div class="stat-card">
                    <h3 id="totalApplicants">0</h3>
                    <p>Applicants</p>
                </div>

                <div class="stat-card">
                    <h3 id="totalMessages">0</h3>
                    <p>Messages</p>
                </div>

            </div>
        </section>

        <!-- POST JOB -->
        <section id="view-postJob" class="view">
            <h2>Post Job</h2>

            <input id="jobTitle" placeholder="Job Title">
            <input id="jobCompany" placeholder="Company">
            <input id="jobSalary" placeholder="Salary">
            <textarea id="jobDescription" placeholder="Description"></textarea>

            <button class="btn-primary" onclick="postJob()">Post Job</button>
        </section>

        <!-- MY JOBS -->
        <section id="view-myJobs" class="view">
            <h2>My Jobs</h2>
            <div id="myJobsContainer"></div>
        </section>

        <!-- FIND JOBS -->
        <section id="view-findJobs" class="view">
            <h2>Find Jobs</h2>

            <input id="jobSearch" placeholder="Search jobs...">

            <div id="jobsContainer"></div>
        </section>

        <!-- APPLICATIONS -->
        <section id="view-applications" class="view">
            <h2>My Applications</h2>
            <div id="applicationsContainer"></div>
        </section>

        <!-- APPLICANTS -->
        <section id="view-applicants" class="view">
            <h2>Applicants</h2>
            <div id="applicantsContainer"></div>
        </section>

        <!-- PROFILE -->
        <section id="view-profile" class="view">
            <h2>Profile</h2>

            <input id="fullName" placeholder="Full Name">
            <input id="jobTitleProfile" placeholder="Job Title">
            <textarea id="bio" placeholder="Bio"></textarea>

            <input type="file" id="resumeUpload">

            <button class="btn-primary" onclick="saveProfile()">
                Save Profile
            </button>
        </section>

        <!-- MESSAGES -->
        <section id="view-messages" class="view">

            <h2>Messages</h2>

            <div class="messages-layout">

                <div id="chatList"></div>

                <div class="chat-panel">

                    <div id="chatMessages"></div>

                    <div class="chat-input-area">
                        <input id="messageInput" placeholder="Type message...">
                        <button onclick="sendMessage()">Send</button>
                    </div>

                </div>

            </div>

        </section>

    </div>
</div>

<!-- =========================
     SCRIPTS (ORDER IMPORTANT)
========================= -->

<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/jobs.js"></script>
<script src="js/chat.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
